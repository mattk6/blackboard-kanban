<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Blackboard Kanban</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="popup">
      <div class="popup-header">
        <img src="icons/icon.png" alt="Blackboard Kanban icon" class="popup-icon" />
        <h1 class="popup-title">Blackboard Kanban</h1>
      </div>
      <p class="popup-desc">Track your course assignments through a visual Kanban workflow — Ready, In Progress, Submitted, and Graded.</p>
      <button id="openBoardBtn" class="btn-open">Open Board</button>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
